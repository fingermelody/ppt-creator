apiVersion: apps/v1
kind: Deployment
metadata:
  name: ppt-rsd-backend
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ppt-rsd-backend
  template:
    metadata:
      labels:
        app: ppt-rsd-backend
    spec:
      containers:
      - name: backend
        image: ccr.ccs.tencentyun.com/ppt-rsd/backend:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: ppt-rsd-config
        - secretRef:
            name: ppt-rsd-secrets
        env:
        - name: DATABASE_URL
          value: "mysql+pymysql://$(DATABASE_USER):$(DATABASE_PASSWORD)@$(DATABASE_HOST):$(DATABASE_PORT)/$(DATABASE_NAME)"
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
