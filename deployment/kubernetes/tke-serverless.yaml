# PPT-RSD Deployment for TKE Serverless
# 使用 CLB 直连 Service 暴露服务

---
# ConfigMap and Secrets
apiVersion: v1
kind: ConfigMap
metadata:
  name: ppt-rsd-config
  namespace: default
data:
  DATABASE_HOST: "10.6.1.13"
  DATABASE_PORT: "3306"
  DATABASE_NAME: "ppt_rsd"
  DATABASE_USER: "root"
  REDIS_HOST: "10.6.1.42"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  ES_HOST: "http://space-k4t5xi0i.ap-guangzhou.qcloudes.com"
  ES_INDEX: "ppt_slides"
  ES_USERNAME: "elastic"
  COS_REGION: "ap-guangzhou"
  COS_BUCKET: "ppt-creator-store-1253851367"

---
apiVersion: v1
kind: Secret
metadata:
  name: ppt-rsd-secrets
  namespace: default
type: Opaque
stringData:
  DATABASE_PASSWORD: "PPT@RSD2024!mysql"
  REDIS_PASSWORD: "caonidaye@123"
  ES_PASSWORD: "caonidaye@123"
  COS_SECRET_ID: "your-secret-id"
  COS_SECRET_KEY: "your-secret-key"
  SECRET_KEY: "ppt-rsd-production-secret-key-2024"

---
# Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ppt-rsd-backend
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ppt-rsd-backend
  template:
    metadata:
      labels:
        app: ppt-rsd-backend
    spec:
      containers:
      - name: backend
        image: ccr.ccs.tencentyun.com/ppt-rsd/backend:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: ppt-rsd-config
        - secretRef:
            name: ppt-rsd-secrets
        env:
        - name: DATABASE_URL
          value: "mysql+pymysql://$(DATABASE_USER):$(DATABASE_PASSWORD)@$(DATABASE_HOST):$(DATABASE_PORT)/$(DATABASE_NAME)"
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5

---
# Backend Service with CLB (LoadBalancer)
apiVersion: v1
kind: Service
metadata:
  name: ppt-rsd-backend
  namespace: default
  annotations:
    service.kubernetes.io/qcloud-loadbalancer-internet-charge-type: "TRAFFIC_POSTPAID_BY_HOUR"
    service.kubernetes.io/qcloud-loadbalancer-traffic-policy: "unicast"
spec:
  selector:
    app: ppt-rsd-backend
  ports:
  - name: http
    port: 80
    targetPort: 8000
    protocol: TCP
  type: LoadBalancer

---
# Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ppt-rsd-frontend
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ppt-rsd-frontend
  template:
    metadata:
      labels:
        app: ppt-rsd-frontend
    spec:
      containers:
      - name: frontend
        image: ccr.ccs.tencentyun.com/ppt-rsd/frontend:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5

---
# Frontend Service with CLB (LoadBalancer)
apiVersion: v1
kind: Service
metadata:
  name: ppt-rsd-frontend
  namespace: default
  annotations:
    service.kubernetes.io/qcloud-loadbalancer-internet-charge-type: "TRAFFIC_POSTPAID_BY_HOUR"
    service.kubernetes.io/qcloud-loadbalancer-traffic-policy: "unicast"
spec:
  selector:
    app: ppt-rsd-frontend
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
  type: LoadBalancer
