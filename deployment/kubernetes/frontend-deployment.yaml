apiVersion: apps/v1
kind: Deployment
metadata:
  name: ppt-rsd-frontend
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ppt-rsd-frontend
  template:
    metadata:
      labels:
        app: ppt-rsd-frontend
    spec:
      containers:
      - name: frontend
        image: ccr.ccs.tencentyun.com/ppt-rsd/frontend:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ppt-rsd-frontend
  namespace: default
spec:
  selector:
    app: ppt-rsd-frontend
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP
