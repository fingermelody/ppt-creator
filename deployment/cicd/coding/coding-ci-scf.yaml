# ============================================
# CODING 持续集成流水线配置 - SCF 部署版本
# PPT-RSD 项目
# ============================================
#
# 使用说明:
# 1. 在 CODING 项目中创建持续集成计划
# 2. 选择"自定义构建过程"
# 3. 粘贴此配置文件内容
# 4. 配置环境变量（在流水线设置中）
#
# 所需环境变量:
# - TENCENT_SECRET_ID: 腾讯云 API SecretId
# - TENCENT_SECRET_KEY: 腾讯云 API SecretKey
# - DATABASE_URL: 数据库连接字符串
# - REDIS_URL: Redis 连接字符串
# - SECRET_KEY: 应用密钥
# - COS_BUCKET: COS 存储桶名称
# - COS_REGION: COS 地域
# - COS_SECRET_ID: COS 访问密钥
# - COS_SECRET_KEY: COS 密钥
# - VPC_ID: VPC ID（可选）
# - SUBNET_ID: 子网 ID（可选）
# ============================================

master:
  push:
    - stages:
        - name: "代码检出"
          script: |
            echo "📦 检出代码..."
            git clone $GIT_CLONE_URL --depth 1 --branch $GIT_BRANCH .
            echo "✅ 代码检出完成"

        - name: "安装依赖"
          script: |
            echo "📥 安装 Serverless Framework..."
            npm install -g serverless
            
            echo "📥 安装前端依赖..."
            cd frontend
            npm ci
            cd ..
            
            echo "✅ 依赖安装完成"

        - name: "前端构建"
          script: |
            echo "🔨 构建前端..."
            cd frontend
            npm run build
            cd ..
            echo "✅ 前端构建完成"

        - name: "后端测试"
          script: |
            echo "🧪 运行后端测试..."
            cd backend
            pip install -r requirements.txt -q
            pip install pytest pytest-cov -q
            python -m pytest tests/ -v --tb=short || echo "⚠️ 部分测试跳过"
            cd ..
            echo "✅ 测试完成"

        - name: "部署到 SCF (生产环境)"
          script: |
            echo "🚀 部署到腾讯云 SCF..."
            
            # 配置 Serverless 凭证
            export SERVERLESS_PLATFORM_VENDOR=tencent
            
            # 创建 .env 文件
            cd deployment/scf
            cat > .env << EOF
            STAGE=prod
            REGION=ap-guangzhou
            DATABASE_URL=$DATABASE_URL
            REDIS_URL=$REDIS_URL
            SECRET_KEY=$SECRET_KEY
            COS_BUCKET=$COS_BUCKET
            COS_REGION=$COS_REGION
            COS_SECRET_ID=$COS_SECRET_ID
            COS_SECRET_KEY=$COS_SECRET_KEY
            VPC_ID=$VPC_ID
            SUBNET_ID=$SUBNET_ID
            TENCENT_SECRET_ID=$TENCENT_SECRET_ID
            TENCENT_SECRET_KEY=$TENCENT_SECRET_KEY
            EOF
            
            # 部署
            serverless deploy --debug
            
            echo "✅ 部署完成"

        - name: "验证部署"
          script: |
            echo "🔍 验证部署..."
            
            # 获取部署输出
            cd deployment/scf
            serverless info --debug
            
            echo "✅ 验证完成"

# ============================================
# 开发环境部署（feature/* 分支）
# ============================================
feature:
  push:
    - stages:
        - name: "代码检出"
          script: |
            echo "📦 检出代码..."
            git clone $GIT_CLONE_URL --depth 1 --branch $GIT_BRANCH .

        - name: "安装依赖"
          script: |
            npm install -g serverless
            cd frontend && npm ci && cd ..

        - name: "前端构建"
          script: |
            cd frontend && npm run build && cd ..

        - name: "部署到 SCF (开发环境)"
          script: |
            echo "🚀 部署到开发环境..."
            
            export SERVERLESS_PLATFORM_VENDOR=tencent
            
            cd deployment/scf
            cat > .env << EOF
            STAGE=dev
            REGION=ap-guangzhou
            DATABASE_URL=$DATABASE_URL_DEV
            REDIS_URL=$REDIS_URL_DEV
            SECRET_KEY=$SECRET_KEY
            COS_BUCKET=$COS_BUCKET_DEV
            COS_REGION=$COS_REGION
            COS_SECRET_ID=$COS_SECRET_ID
            COS_SECRET_KEY=$COS_SECRET_KEY
            TENCENT_SECRET_ID=$TENCENT_SECRET_ID
            TENCENT_SECRET_KEY=$TENCENT_SECRET_KEY
            EOF
            
            serverless deploy --debug
            
            echo "✅ 开发环境部署完成"

# ============================================
# 测试环境部署（release/* 分支）
# ============================================
release:
  push:
    - stages:
        - name: "代码检出"
          script: |
            git clone $GIT_CLONE_URL --depth 1 --branch $GIT_BRANCH .

        - name: "安装依赖"
          script: |
            npm install -g serverless
            cd frontend && npm ci && cd ..

        - name: "前端构建"
          script: |
            cd frontend && npm run build && cd ..

        - name: "后端测试"
          script: |
            cd backend
            pip install -r requirements.txt -q
            pip install pytest pytest-cov -q
            python -m pytest tests/ -v
            cd ..

        - name: "部署到 SCF (测试环境)"
          script: |
            export SERVERLESS_PLATFORM_VENDOR=tencent
            
            cd deployment/scf
            cat > .env << EOF
            STAGE=test
            REGION=ap-guangzhou
            DATABASE_URL=$DATABASE_URL_TEST
            REDIS_URL=$REDIS_URL_TEST
            SECRET_KEY=$SECRET_KEY
            COS_BUCKET=$COS_BUCKET_TEST
            COS_REGION=$COS_REGION
            COS_SECRET_ID=$COS_SECRET_ID
            COS_SECRET_KEY=$COS_SECRET_KEY
            TENCENT_SECRET_ID=$TENCENT_SECRET_ID
            TENCENT_SECRET_KEY=$TENCENT_SECRET_KEY
            EOF
            
            serverless deploy --debug

# ============================================
# 手动部署（MR 合并触发）
# ============================================
mr:
  merged:
    - stages:
        - name: "通知"
          script: |
            echo "🎉 MR 已合并，等待 master 分支自动部署..."
