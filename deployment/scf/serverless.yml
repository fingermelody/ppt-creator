# ============================================
# 腾讯云 SCF Serverless 部署配置
# PPT-RSD 项目 - 后端 API
# ============================================

component: scf
name: ppt-rsd-backend
app: ppt-rsd
stage: ${env:STAGE, 'dev'}

inputs:
  name: ppt-rsd-backend-${stage}
  # Web 函数类型
  type: web
  # 运行环境
  runtime: Python3.9
  # 地域
  region: ${env:REGION, 'ap-guangzhou'}
  # 源代码
  src:
    src: ../../backend
    exclude:
      - .git/**
      - .gitignore
      - __pycache__/**
      - "*.pyc"
      - .env
      - .env.*
      - tests/**
      - "*.md"
  # Web 函数启动文件
  entryFile: scf_bootstrap
  # 内存配置 (MB)
  memorySize: 512
  # 超时时间 (秒)
  timeout: 30
  # 环境变量
  environment:
    variables:
      STAGE: ${stage}
      DEBUG: "false"
      SECRET_KEY: ${env:SECRET_KEY, 'change-me-in-production'}
  # API 网关触发器
  events:
    - apigw:
        parameters:
          serviceName: ppt-rsd-api-${stage}
          description: PPT-RSD Backend API
          protocols:
            - https
            - http
          environment: release
          endpoints:
            - path: /
              method: ANY
              enableCORS: true
            - path: /{proxy+}
              method: ANY
              enableCORS: true
