# ============================================
# GitHub Actions 持续集成/部署流水线
# PPT-RSD 项目
# ============================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  TCR_REGISTRY: ppt-creator-registry.tencentcloudcr.com
  TCR_NAMESPACE: ppt-creator
  TKE_CLUSTER_ID: ${{ secrets.TKE_CLUSTER_ID }}
  TKE_NAMESPACE: ppt-creator-prod

jobs:
  # ==========================================
  # 前端构建
  # ==========================================
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      
      - name: Build
        working-directory: frontend
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ==========================================
  # 后端测试
  # ==========================================
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_ppt_rsd
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        ports:
          - 6379:6379
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements*.txt
      
      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements-dev.txt
      
      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_ppt_rsd
          REDIS_URL: redis://localhost:6379/0
        run: |
          pytest tests/ -v --cov=app --cov-report=xml
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: backend/coverage.xml
          fail_ci_if_error: false

  # ==========================================
  # 构建并推送镜像
  # ==========================================
  build-and-push:
    needs: [build-frontend, test-backend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
      
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to TCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.TCR_REGISTRY }}
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}
      
      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployment/docker/Dockerfile.frontend
          push: true
          tags: |
            ${{ env.TCR_REGISTRY }}/${{ env.TCR_NAMESPACE }}/frontend:${{ github.sha }}
            ${{ env.TCR_REGISTRY }}/${{ env.TCR_NAMESPACE }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: deployment/docker/Dockerfile.backend
          push: true
          tags: |
            ${{ env.TCR_REGISTRY }}/${{ env.TCR_NAMESPACE }}/backend:${{ github.sha }}
            ${{ env.TCR_REGISTRY }}/${{ env.TCR_NAMESPACE }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build and push Worker
        uses: docker/build-push-action@v5
        with:
          context: ./workers
          file: deployment/docker/Dockerfile.worker
          push: true
          tags: |
            ${{ env.TCR_REGISTRY }}/${{ env.TCR_NAMESPACE }}/worker:${{ github.sha }}
            ${{ env.TCR_REGISTRY }}/${{ env.TCR_NAMESPACE }}/worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================
  # 部署到 TKE
  # ==========================================
  deploy-to-tke:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://ppt-rsd.example.com
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'
      
      - name: Configure TKE credentials
        uses: tencentcloud/tke-cluster-credential-action@v1
        with:
          secret_id: ${{ secrets.TENCENT_SECRET_ID }}
          secret_key: ${{ secrets.TENCENT_SECRET_KEY }}
          tke_region: ap-guangzhou
          cluster_id: ${{ secrets.TKE_CLUSTER_ID }}
      
      - name: Deploy to TKE
        run: |
          # 更新镜像
          kubectl set image deployment/frontend \
            frontend=${{ env.TCR_REGISTRY }}/${{ env.TCR_NAMESPACE }}/frontend:${{ github.sha }} \
            -n ${{ env.TKE_NAMESPACE }}
          
          kubectl set image deployment/backend \
            backend=${{ env.TCR_REGISTRY }}/${{ env.TCR_NAMESPACE }}/backend:${{ github.sha }} \
            -n ${{ env.TKE_NAMESPACE }}
          
          kubectl set image deployment/worker \
            worker=${{ env.TCR_REGISTRY }}/${{ env.TCR_NAMESPACE }}/worker:${{ github.sha }} \
            -n ${{ env.TKE_NAMESPACE }}
          
          # 等待部署完成
          kubectl rollout status deployment/frontend -n ${{ env.TKE_NAMESPACE }} --timeout=300s
          kubectl rollout status deployment/backend -n ${{ env.TKE_NAMESPACE }} --timeout=300s
          kubectl rollout status deployment/worker -n ${{ env.TKE_NAMESPACE }} --timeout=300s
      
      - name: Verify deployment
        run: |
          kubectl get pods -n ${{ env.TKE_NAMESPACE }}
          kubectl get svc -n ${{ env.TKE_NAMESPACE }}
