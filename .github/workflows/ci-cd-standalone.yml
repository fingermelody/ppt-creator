# ============================================
# PPT-RSD CI/CD 流水线
# GitHub Actions → Docker Build → TCR → TKE
# ============================================

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'prod'
        type: choice
        options:
          - prod
          - test

env:
  TCR_REGISTRY: ccr.ccs.tencentyun.com
  TCR_NAMESPACE: codebuddy-ppt-creator
  TKE_REGION: ap-guangzhou
  PROD_DOMAIN: ppt.bottlepeace.com
  TEST_DOMAIN: test.ppt.bottlepeace.com

jobs:
  # ==========================================
  # 代码检查 — 失败会阻断后续流程
  # ==========================================
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements*.txt

      - name: Install and lint frontend
        run: |
          cd frontend
          npm ci
          npm run lint

      - name: Install and lint backend
        run: |
          cd backend
          pip install -r requirements.txt
          pip install ruff
          ruff check .

  # ==========================================
  # 单元测试 — 失败会阻断构建
  # ==========================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_password
          MYSQL_DATABASE: ppt_rsd_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run tests
        env:
          DATABASE_URL: mysql+pymysql://root:test_password@localhost:3306/ppt_rsd_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key
          APP_ENV: test
        run: |
          cd backend
          pytest tests/ -v --tb=short --cov=app --cov-report=xml

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          fail_ci_if_error: false

  # ==========================================
  # 安全扫描 — CRITICAL 漏洞阻断构建
  # ==========================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL'

  # ==========================================
  # 构建并推送 Docker 镜像
  # ==========================================
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to TCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.TCR_REGISTRY }}
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}

      - name: Generate image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE_TAG="$(date +%Y%m%d%H%M%S)-${SHORT_SHA}"
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "Image tag: ${IMAGE_TAG}"

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployment/docker/Dockerfile.backend
          push: true
          tags: |
            ${{ env.TCR_REGISTRY }}/${{ env.TCR_NAMESPACE }}/backend:${{ steps.meta.outputs.image_tag }}
            ${{ env.TCR_REGISTRY }}/${{ env.TCR_NAMESPACE }}/backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployment/docker/Dockerfile.frontend
          push: true
          tags: |
            ${{ env.TCR_REGISTRY }}/${{ env.TCR_NAMESPACE }}/frontend:${{ steps.meta.outputs.image_tag }}
            ${{ env.TCR_REGISTRY }}/${{ env.TCR_NAMESPACE }}/frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ==========================================
  # 部署到 TKE 生产环境
  # ==========================================
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod')
    environment:
      name: production
      url: https://ppt.bottlepeace.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure TKE credentials
        uses: tencentcloud/tke-cluster-credential-action@v1
        with:
          secret_id: ${{ secrets.TENCENT_SECRET_ID }}
          secret_key: ${{ secrets.TENCENT_SECRET_KEY }}
          tke_region: ${{ env.TKE_REGION }}
          cluster_id: ${{ secrets.TKE_CLUSTER_ID }}

      - name: Deploy backend
        run: |
          kubectl set image deployment/ppt-backend \
            backend=${{ env.TCR_REGISTRY }}/${{ env.TCR_NAMESPACE }}/backend:${{ needs.build.outputs.image_tag }} \
            -n ppt-rsd-prod

      - name: Deploy frontend
        run: |
          kubectl set image deployment/ppt-frontend \
            frontend=${{ env.TCR_REGISTRY }}/${{ env.TCR_NAMESPACE }}/frontend:${{ needs.build.outputs.image_tag }} \
            -n ppt-rsd-prod

      - name: Wait for rollout
        id: rollout
        run: |
          echo "Waiting for backend rollout..."
          kubectl rollout status deployment/ppt-backend -n ppt-rsd-prod --timeout=300s

          echo "Waiting for frontend rollout..."
          kubectl rollout status deployment/ppt-frontend -n ppt-rsd-prod --timeout=300s

      - name: Health check
        run: |
          echo "Checking pod status..."
          kubectl get pods -n ppt-rsd-prod -l "app in (ppt-backend, ppt-frontend)"

          echo ""
          echo "Checking backend readiness..."
          BACKEND_POD=$(kubectl get pods -n ppt-rsd-prod -l app=ppt-backend -o jsonpath='{.items[0].metadata.name}')
          kubectl exec "$BACKEND_POD" -n ppt-rsd-prod -- curl -sf http://localhost:8000/health || {
            echo "Backend health check failed"
            exit 1
          }

          echo "Backend is healthy"

      - name: Rollback on failure
        if: failure() && steps.rollout.outcome == 'failure'
        run: |
          echo "Deployment failed, rolling back..."
          kubectl rollout undo deployment/ppt-backend -n ppt-rsd-prod
          kubectl rollout undo deployment/ppt-frontend -n ppt-rsd-prod
          echo "Rollback completed"

      - name: Deployment summary
        if: success()
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Access URLs" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend**: https://${{ env.PROD_DOMAIN }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend API**: https://api.${{ env.PROD_DOMAIN }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Image Tag" >> $GITHUB_STEP_SUMMARY
          echo "\`${{ needs.build.outputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pods" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n ppt-rsd-prod -l "app in (ppt-backend, ppt-frontend)" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  # ==========================================
  # 部署到 TKE 测试环境
  # ==========================================
  deploy-test:
    name: Deploy to Test
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'test')
    environment:
      name: test
      url: https://test.ppt.bottlepeace.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure TKE credentials
        uses: tencentcloud/tke-cluster-credential-action@v1
        with:
          secret_id: ${{ secrets.TENCENT_SECRET_ID }}
          secret_key: ${{ secrets.TENCENT_SECRET_KEY }}
          tke_region: ${{ env.TKE_REGION }}
          cluster_id: ${{ secrets.TKE_CLUSTER_ID }}

      - name: Deploy to test environment
        run: |
          kubectl set image deployment/ppt-backend \
            backend=${{ env.TCR_REGISTRY }}/${{ env.TCR_NAMESPACE }}/backend:${{ needs.build.outputs.image_tag }} \
            -n ppt-rsd-test

          kubectl set image deployment/ppt-frontend \
            frontend=${{ env.TCR_REGISTRY }}/${{ env.TCR_NAMESPACE }}/frontend:${{ needs.build.outputs.image_tag }} \
            -n ppt-rsd-test

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/ppt-backend -n ppt-rsd-test --timeout=300s
          kubectl rollout status deployment/ppt-frontend -n ppt-rsd-test --timeout=300s

      - name: Deployment summary
        if: success()
        run: |
          echo "## Test Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: https://${{ env.TEST_DOMAIN }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: \`${{ needs.build.outputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY

  # ==========================================
  # 部署结果通知
  # ==========================================
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [deploy-prod]
    if: always() && github.ref == 'refs/heads/main'

    steps:
      - name: Deployment result
        run: |
          if [ "${{ needs.deploy-prod.result }}" = "success" ]; then
            echo "## ✅ Production deployment succeeded" >> $GITHUB_STEP_SUMMARY
            echo "Tag: \`${{ needs.build.outputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Production deployment failed" >> $GITHUB_STEP_SUMMARY
            echo "Check the deploy-prod job logs for details." >> $GITHUB_STEP_SUMMARY
          fi
