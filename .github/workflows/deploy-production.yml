# ============================================
# PPT-RSD 生产环境自动部署流水线
# 域名: ppt.bottlepeace.com
# ============================================

name: Deploy to Production

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:  # 允许手动触发

env:
  # 固定配置
  REGION: ap-guangzhou
  FRONTEND_DOMAIN: ppt.bottlepeace.com
  API_DOMAIN: api.ppt.bottlepeace.com
  
  # COS 配置
  COS_BUCKET: ppt-rsd-frontend
  COS_REGION: ap-guangzhou
  
  # SCF 配置
  SCF_FUNCTION_NAME: ppt-rsd-backend
  SCF_RUNTIME: Python3.9

jobs:
  # ============================================
  # 构建前端
  # ============================================
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 创建生产环境配置
        run: |
          cat > frontend/.env.production << EOF
          VITE_API_URL=https://${{ env.API_DOMAIN }}
          VITE_APP_TITLE=PPT-RSD
          VITE_ENABLE_MOCK=false
          EOF

      - name: 安装依赖
        run: cd frontend && npm ci

      - name: 构建
        run: cd frontend && npm run build

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ============================================
  # 部署前端到 COS
  # ============================================
  deploy-frontend:
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: 安装 coscmd
        run: pip install coscmd

      - name: 配置 coscmd
        run: |
          coscmd config \
            -a ${{ secrets.TENCENT_SECRET_ID }} \
            -s ${{ secrets.TENCENT_SECRET_KEY }} \
            -b ${{ env.COS_BUCKET }} \
            -r ${{ env.COS_REGION }}

      - name: 上传到 COS
        run: |
          cd dist
          coscmd upload -rs . /

      - name: 配置静态网站
        run: |
          coscmd putbucketwebsite --index index.html --error index.html

  # ============================================
  # 部署后端到 SCF
  # ============================================
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 打包后端代码
        run: |
          cd backend
          rm -rf __pycache__ tests .env* *.md
          find . -name "*.pyc" -delete
          find . -name "__pycache__" -type d -delete
          zip -r ../backend.zip . -x "*.pyc" -x "*__pycache__*"

      - name: 安装 tccli
        run: pip install tccli

      - name: 配置 tccli
        run: |
          tccli configure set \
            secretId ${{ secrets.TENCENT_SECRET_ID }} \
            secretKey ${{ secrets.TENCENT_SECRET_KEY }} \
            region ${{ env.REGION }}

      - name: 部署到 SCF
        run: |
          # 更新函数代码
          tccli scf UpdateFunctionCode \
            --FunctionName ${{ env.SCF_FUNCTION_NAME }} \
            --ZipFile $(base64 -w 0 backend.zip) \
            --region ${{ env.REGION }} || \
          # 如果函数不存在，创建新函数
          tccli scf CreateFunction \
            --FunctionName ${{ env.SCF_FUNCTION_NAME }} \
            --Runtime ${{ env.SCF_RUNTIME }} \
            --Handler "app.main.handler" \
            --MemorySize 512 \
            --Timeout 30 \
            --Type Web \
            --region ${{ env.REGION }} \
            --Code '{"ZipFile":"'$(base64 -w 0 backend.zip)'"}'

  # ============================================
  # 部署完成通知
  # ============================================
  notify:
    needs: [deploy-frontend, deploy-backend]
    runs-on: ubuntu-latest
    steps:
      - name: 部署成功通知
        run: |
          echo "✅ 部署完成！"
          echo ""
          echo "📌 访问地址:"
          echo "   前端: https://${{ env.FRONTEND_DOMAIN }}"
          echo "   API:  https://${{ env.API_DOMAIN }}"
