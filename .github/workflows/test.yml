# ============================================
# PPT-RSD 测试流水线
# 自动运行单元测试和集成测试
# ============================================

name: Test

on:
  push:
    branches: [main, develop, feature/*]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  # ============================================
  # 后端单元测试
  # ============================================
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_password
          MYSQL_DATABASE: ppt_rsd_test
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx faker

      - name: Run tests
        env:
          DATABASE_URL: mysql+pymysql://test_user:test_password@localhost:3306/ppt_rsd_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key
          APP_ENV: test
          LLM_ENABLED: false
        run: |
          cd backend
          pytest ../tests/ -v --tb=short \
            --junitxml=test-results.xml \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: backend/test-results.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml

      - name: Comment coverage on PR
        uses: py-cov-action/python-coverage-comment-action@v3
        if: github.event_name == 'pull_request'
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COVERAGE_PATH: backend/coverage.xml

  # ============================================
  # 前端测试
  # ============================================
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run lint
        run: |
          cd frontend
          npm run lint || true

      - name: Run type check
        run: |
          cd frontend
          npm run type-check || true

      - name: Run tests
        run: |
          cd frontend
          npm run test -- --coverage --watchAll=false || true

      - name: Build
        run: |
          cd frontend
          npm run build

  # ============================================
  # 集成测试（Docker Compose）
  # ============================================
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [backend-test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test images
        run: |
          docker compose -f deployment/docker/docker-compose.test.yml build

      - name: Run integration tests
        run: |
          docker compose -f deployment/docker/docker-compose.test.yml up -d mysql-test redis-test
          sleep 30  # 等待数据库就绪
          docker compose -f deployment/docker/docker-compose.test.yml up --exit-code-from test-runner test-runner

      - name: Collect test results
        if: always()
        run: |
          docker compose -f deployment/docker/docker-compose.test.yml cp test-runner:/app/results ./test-results || true

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: test-results/

      - name: Cleanup
        if: always()
        run: |
          docker compose -f deployment/docker/docker-compose.test.yml down -v

  # ============================================
  # 构建并推送测试镜像
  # ============================================
  build-test-images:
    name: Build Test Images
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/heads/feature/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Tencent CCR
        uses: docker/login-action@v3
        with:
          registry: ccr.ccs.tencentyun.com
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}

      - name: Extract branch name
        id: branch
        run: echo "name=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT

      - name: Build and push backend test image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployment/docker/Dockerfile.backend
          push: true
          tags: |
            ccr.ccs.tencentyun.com/codebuddy-ppt-creator/backend:test-${{ github.sha }}
            ccr.ccs.tencentyun.com/codebuddy-ppt-creator/backend:test-latest

      - name: Build and push frontend test image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployment/docker/Dockerfile.frontend
          push: true
          tags: |
            ccr.ccs.tencentyun.com/codebuddy-ppt-creator/frontend:test-${{ github.sha }}
            ccr.ccs.tencentyun.com/codebuddy-ppt-creator/frontend:test-latest

  # ============================================
  # 部署测试环境
  # ============================================
  deploy-test:
    name: Deploy Test Environment
    runs-on: ubuntu-latest
    needs: [build-test-images, integration-test]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: test
      url: https://test.ppt-rsd.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to test server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.TEST_SERVER_HOST }}
          username: root
          key: ${{ secrets.TEST_SSH_PRIVATE_KEY }}
          script: |
            cd /opt/ppt-rsd-test
            
            # 登录镜像仓库
            echo "${{ secrets.TCR_PASSWORD }}" | docker login ccr.ccs.tencentyun.com -u ${{ secrets.TCR_USERNAME }} --password-stdin
            
            # 更新镜像
            docker compose pull
            
            # 重启服务
            docker compose up -d
            
            # 清理旧镜像
            docker image prune -f
            
            # 验证服务状态
            sleep 10
            curl -f http://localhost:8000/api/v1/health || exit 1

      - name: Run smoke tests
        run: |
          echo "Running smoke tests against test environment..."
          # 添加冒烟测试命令
